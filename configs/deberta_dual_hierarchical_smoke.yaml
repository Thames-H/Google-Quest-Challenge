data_dir: ../google-quest-data/google-quest-challenge
artifacts_dir: artifacts_deberta_smoke
backbone: microsoft/deberta-v3-base
folds: 2
seeds:
  - 42
epochs: 1
lr_encoder: 2.0e-5
lr_head: 8.0e-4
weight_decay: 0.01
warmup_ratio: 0.0
max_len_question: 128
max_len_answer: 128
max_title_tokens: 24
question_chunk_size: 48
answer_chunk_size: 48
question_chunk_overlap: 12
answer_chunk_overlap: 12
question_max_chunks: 2
answer_max_chunks: 2
batch_size: 2
grad_accum_steps: 1
fp16: false
gradient_checkpointing: true
num_workers: 0
dropout: 0.1
device: auto
use_metadata: true
meta_embedding_dim: 8
meta_hidden_dim: 32
pointwise_loss: smooth_l1
pointwise_weight: 1.0
ranking_weight: 0.2
ranking_margin: 0.05
distribution_matching: true
debug: false
debug_folds: 1
debug_epochs: 1
debug_batches: 8
train_row_limit: 12
test_row_limit: 8
